<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KFC Greece — Sales Command Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
<style>
/* ================================================================
   MOBILE-FIRST DESIGN — base = 360px portrait
   Enhanced for tablet (≥768px) and desktop (≥1280px)
   ================================================================ */

:root {
  --bg-0: #0a0e14;
  --bg-1: #11161e;
  --bg-2: #1a212c;
  --bg-3: #232b38;
  --border: #2d3748;
  --border-soft: #1f2733;
  --text-0: #e8edf5;
  --text-1: #aab4c5;
  --text-2: #6b7689;
  --accent: #ef4444;
  --accent-2: #f97316;
  --good: #22c55e;
  --good-soft: rgba(34,197,94,0.12);
  --bad: #ef4444;
  --bad-soft: rgba(239,68,68,0.12);
  --warn: #f59e0b;
  --neutral: #64748b;
  --kfc: #e4002b;
  --mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
  --sans: 'Inter Tight', -apple-system, system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-0);
  color: var(--text-0);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

body {
  background:
    radial-gradient(ellipse at top, rgba(228,0,43,0.05) 0%, transparent 50%),
    var(--bg-0);
  min-height: 100vh;
}

/* ================================================================
   APP CONTAINER (mobile = full width with small padding)
   ================================================================ */
.app {
  width: 100%;
  max-width: 100%;
  padding: 12px;
}

/* ================================================================
   LOADING OVERLAY
   ================================================================ */
#loadingOverlay {
  position: fixed; inset: 0;
  background: var(--bg-0);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  transition: opacity 0.3s ease;
}
#loadingOverlay .mark {
  width: 44px; height: 44px;
  background: var(--kfc);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; color: white;
  margin-bottom: 18px;
}
#loadingOverlay .msg {
  font-size: 13px;
  color: var(--text-1);
  letter-spacing: 0.5px;
  text-align: center;
}
#loadingOverlay .progress {
  margin-top: 14px;
  width: 200px;
  max-width: 80vw;
  height: 3px;
  background: var(--bg-2);
  border-radius: 2px;
  overflow: hidden;
}
#loadingOverlay .bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--kfc), var(--accent-2));
  transition: width 0.25s ease;
}
.error-box {
  background: var(--bad-soft);
  border: 1px solid var(--bad);
  color: var(--text-0);
  padding: 16px;
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 12px;
  max-width: 480px;
  width: 100%;
  margin: 20px auto;
}
.error-box .title { font-weight: 700; color: var(--bad); margin-bottom: 8px; font-size: 13px; }

/* ================================================================
   PASSWORD SCREEN
   ================================================================ */
#pwScreen {
  position: fixed; inset: 0;
  background: var(--bg-0);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#pwScreen .panel-pw {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px 24px;
  width: 100%;
  max-width: 360px;
  position: relative;
  overflow: hidden;
}
#pwScreen .panel-pw::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--kfc), var(--accent-2));
}
#pwScreen .pw-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 22px;
}
#pwScreen .pw-brand .mark {
  width: 38px; height: 38px;
  background: var(--kfc);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 13px; color: white;
}
#pwScreen .pw-brand .title { font-size: 15px; font-weight: 700; color: var(--text-0); }
#pwScreen .pw-brand .subtitle {
  font-family: var(--mono); font-size: 9px; color: var(--text-2);
  letter-spacing: 1px; text-transform: uppercase; margin-top: 2px;
}
#pwScreen .pw-label {
  font-size: 12px;
  color: var(--text-1);
  margin-bottom: 8px;
}
#pwScreen input[type="password"] {
  width: 100%;
  background: var(--bg-2);
  color: var(--text-0);
  border: 1px solid var(--border);
  padding: 12px 14px;
  border-radius: 6px;
  font-size: 16px;
  font-family: var(--mono);
  outline: none;
  letter-spacing: 2px;
}
#pwScreen input[type="password"]:focus { border-color: var(--accent); }
#pwScreen .pw-error {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--bad);
  margin-top: 8px;
  min-height: 14px;
}
#pwScreen button {
  width: 100%;
  background: var(--kfc);
  color: white;
  border: none;
  padding: 12px 16px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--sans);
  margin-top: 14px;
}
#pwScreen button:active { transform: scale(0.99); }
#pwScreen button:disabled { opacity: 0.4; cursor: not-allowed; }
#pwScreen .pw-footer {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-2);
  letter-spacing: 1px;
  margin-top: 18px;
  text-align: center;
  text-transform: uppercase;
}

/* ================================================================
   HEADER (mobile = stacked vertically, all info visible)
   ================================================================ */
.header {
  background: linear-gradient(180deg, rgba(228,0,43,0.1) 0%, var(--bg-1) 100%);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--kfc), var(--accent-2));
}
.header-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-mark {
  width: 36px; height: 36px;
  background: var(--kfc);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 12px; color: white;
  flex-shrink: 0;
}
.brand-text { flex: 1; min-width: 0; }
.brand-text h1 {
  font-size: 15px;
  font-weight: 700;
  line-height: 1.2;
  color: var(--text-0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.brand-text .subtitle {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-2);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-meta {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border-soft);
}
.header-meta .item {
  min-width: 0;
}
.header-meta .label {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--text-2);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-meta .value {
  font-size: 12px;
  font-weight: 600;
  font-family: var(--mono);
  color: var(--text-0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.live-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--good);
  margin-right: 4px;
  vertical-align: 0;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ================================================================
   CONTROLS (mobile = stacked, full-width)
   ================================================================ */
.controls {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.control-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.control-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-2);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.btn-group {
  display: flex;
  background: var(--bg-2);
  border-radius: 6px;
  padding: 2px;
  gap: 1px;
  flex-wrap: wrap;
}
.btn-group button {
  flex: 1;
  min-width: 0;
  background: transparent;
  color: var(--text-1);
  border: none;
  padding: 8px 6px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 4px;
  font-family: var(--sans);
  transition: background 0.15s ease;
  white-space: nowrap;
}
.btn-group button:active { background: var(--bg-3); }
.btn-group button.active {
  background: var(--accent);
  color: white;
  font-weight: 600;
}
.control-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.control-row > * { flex: 1; min-width: 0; }
input[type="date"], select {
  background: var(--bg-2);
  color: var(--text-0);
  border: 1px solid var(--border);
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 13px;
  font-family: var(--sans);
  width: 100%;
}
input[type="date"]:focus, select:focus { outline: none; border-color: var(--accent); }

/* ================================================================
   KPI CARDS (mobile = 2 columns, tablet = 3, desktop = 6)
   ================================================================ */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 12px;
}
.kpi-card {
  background: var(--bg-1);
  border: 1px solid var(--border-soft);
  border-radius: 8px;
  padding: 10px 12px;
  position: relative;
  overflow: hidden;
  min-width: 0;
}
.kpi-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
}
.kpi-card.primary::before { background: var(--accent); }
.kpi-card.secondary::before { background: var(--accent-2); }
.kpi-card.tertiary::before { background: var(--good); }
.kpi-label {
  font-family: var(--mono);
  font-size: 8.5px;
  color: var(--text-2);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.kpi-value {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-0);
}
.kpi-sub {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-top: 6px;
  font-size: 10px;
}
.kpi-sub .row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  min-width: 0;
}
.kpi-sub .versus {
  color: var(--text-2);
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.kpi-sub .delta {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
  white-space: nowrap;
}
.delta.pos { color: var(--good); background: var(--good-soft); }
.delta.neg { color: var(--bad); background: var(--bad-soft); }
.delta.flat { color: var(--neutral); background: rgba(100,116,139,0.12); }

/* ================================================================
   TABS (mobile = horizontal scroll, smooth)
   ================================================================ */
.tabs-wrap {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 8px 8px 0 0;
  border-bottom: none;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  width: 100%;
  max-width: 100%;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs {
  display: flex;
  gap: 0;
  min-width: max-content;
  border-bottom: 1px solid var(--border);
}
.tab {
  flex-shrink: 0;
  background: transparent;
  border: none;
  color: var(--text-1);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  padding: 11px 14px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color 0.15s ease;
}
.tab:active { color: var(--text-0); }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}

/* ================================================================
   PANEL (content area below tabs)
   ================================================================ */
.panel {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 8px 8px;
  padding: 12px;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}
.tab-content {
  display: none;
  width: 100%;
  max-width: 100%;
}
.tab-content.active {
  display: block;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.panel-section {
  margin-bottom: 20px;
  width: 100%;
  max-width: 100%;
}
.panel-section:last-child { margin-bottom: 0; }
.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-1);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.section-title .meta {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-2);
  font-weight: 400;
  letter-spacing: 0.5px;
  text-transform: none;
}

/* ================================================================
   CARD-BASED DATA LAYOUT (mobile primary)
   Each "row" of data is a card with vertical label/value pairs
   ================================================================ */
.cards {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
}

.card {
  background: var(--bg-2);
  border: 1px solid var(--border-soft);
  border-radius: 8px;
  padding: 10px 12px;
  width: 100%;
  max-width: 100%;
  overflow: hidden;
  position: relative;
}
.card.accent { border-left: 3px solid var(--accent); padding-left: 10px; }
.card.accent-2 { border-left: 3px solid var(--accent-2); padding-left: 10px; }
.card.good { border-left: 3px solid var(--good); padding-left: 10px; }
.card.grand {
  border-left: 3px solid var(--kfc);
  background: linear-gradient(180deg, rgba(228,0,43,0.12) 0%, rgba(228,0,43,0.05) 100%);
  padding-left: 10px;
}
.card.subcard {
  background: var(--bg-3);
  margin-left: 12px;
  max-width: calc(100% - 12px);
}

.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-0);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.card-title .name {
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-title .rank {
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-2);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.card-rows {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.card-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  min-width: 0;
  font-size: 12px;
  min-height: 20px;
}
.card-row .lbl {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-2);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 1;
}
.card-row .val {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  color: var(--text-0);
  font-size: 12px;
  white-space: nowrap;
  flex-shrink: 0;
}

.card-row-group {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border-soft);
}
.metric-mini {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
.metric-mini .lbl {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--text-2);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.metric-mini .val {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-0);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Pill-style delta badges (for vs LY, vs Budget) */
.pct {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  white-space: nowrap;
  flex-shrink: 0;
}
.pct.pos { color: var(--good); background: var(--good-soft); }
.pct.neg { color: var(--bad); background: var(--bad-soft); }
.pct.flat { color: var(--neutral); background: rgba(100,116,139,0.12); }

/* Section heading inside content (e.g. for By Sales Type per-store header) */
.subsection-header {
  background: var(--kfc);
  color: white;
  font-weight: 700;
  font-size: 13px;
  padding: 8px 12px;
  border-radius: 6px;
  margin: 12px 0 6px 0;
}
.subsection-header:first-child { margin-top: 0; }

/* Mini progress bar for rankings */
.mini-bar {
  display: inline-block;
  height: 4px;
  background: var(--bg-3);
  border-radius: 2px;
  overflow: hidden;
  vertical-align: middle;
  flex: 1;
  min-width: 30px;
}
.mini-bar > div {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s;
}

/* ================================================================
   HEATMAP (always horizontal scroll on mobile, fits on desktop)
   ================================================================ */
.heatmap-wrap {
  width: 100%;
  max-width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border-radius: 6px;
  border: 1px solid var(--border-soft);
}
.heatmap {
  display: grid;
  gap: 1px;
  background: var(--border-soft);
  min-width: max-content;
}
.heat-cell {
  font-family: var(--mono);
  font-size: 9px;
  padding: 4px 6px;
  text-align: right;
  background: var(--bg-2);
}
.heat-label {
  padding: 4px 8px;
  font-size: 10px;
  color: var(--text-1);
  text-align: left;
  font-weight: 500;
  background: var(--bg-2);
  position: sticky;
  left: 0;
  z-index: 2;
}
.heat-header {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--text-2);
  letter-spacing: 0.5px;
  padding: 4px 6px;
  text-align: center;
  background: var(--bg-2);
}

/* ================================================================
   CHARTS (SVG: scrollable container on mobile)
   ================================================================ */
.chart-wrap {
  background: var(--bg-2);
  border-radius: 6px;
  padding: 10px;
  border: 1px solid var(--border-soft);
  width: 100%;
  max-width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.chart-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-1);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  padding: 0 4px;
}
.chart-wrap svg {
  display: block;
  min-width: 600px;
  height: auto;
}

/* ================================================================
   FOOTER
   ================================================================ */
.footer {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-2);
  letter-spacing: 1px;
  text-align: center;
  margin-top: 16px;
  padding: 12px;
  border-top: 1px solid var(--border-soft);
}

/* ================================================================
   STORE DROPDOWN (deep-dive)
   ================================================================ */
.store-select-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}
.store-select-wrap select {
  width: 100%;
  font-size: 14px;
  padding: 10px 12px;
}

/* ================================================================

<script>
// =====================================================================
// PASSWORD GATE
// =====================================================================
const __PW_HASH__ = "901a59ce290f1a8ac51ac15eff692276dd83bf6bb39155af3fbc204086fd041f";
const __SESSION_KEY__ = "kfc_dash_auth_v2";

async function __sha256(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function __hidePwScreen() {
  const pw = document.getElementById("pwScreen");
  if (pw) pw.remove();
  document.getElementById("loadingOverlay").style.display = "flex";
  startApp();
}

(function setupPasswordGate() {
  try {
    if (sessionStorage.getItem(__SESSION_KEY__) === "1") {
      __hidePwScreen();
      return;
    }
  } catch(e) {}

  const inp = document.getElementById("pwInput");
  const btn = document.getElementById("pwSubmit");
  const err = document.getElementById("pwError");
  let attempts = 0;

  async function tryLogin() {
    if (btn.disabled) return;
    const pw = inp.value;
    if (!pw) { err.textContent = "Εισάγετε κωδικό"; return; }
    const hash = await __sha256(pw);
    if (hash === __PW_HASH__) {
      try { sessionStorage.setItem(__SESSION_KEY__, "1"); } catch(e) {}
      err.textContent = "";
      btn.textContent = "...";
      btn.disabled = true;
      setTimeout(__hidePwScreen, 100);
    } else {
      attempts++;
      err.textContent = "Λάθος κωδικός";
      inp.value = "";
      if (attempts >= 5) {
        btn.disabled = true;
        inp.disabled = true;
        err.textContent = "Πολλές αποτυχημένες προσπάθειες. Refresh τη σελίδα.";
      } else {
        inp.focus();
      }
    }
  }
  btn.addEventListener("click", tryLogin);
  inp.addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });
  inp.focus();
})();

// =====================================================================
// LOADING + DATA FETCH
// =====================================================================
function setProgress(pct, msg) {
  const bar = document.getElementById("loadingBar");
  const m = document.getElementById("loadingMsg");
  if (bar) bar.style.width = pct + "%";
  if (m && msg) m.textContent = msg;
}

function hideLoader() {
  const o = document.getElementById("loadingOverlay");
  const a = document.getElementById("appRoot");
  if (a) a.style.display = "";
  if (o) { o.style.opacity = "0"; setTimeout(() => o.remove(), 300); }
}

function showError(msg, detail) {
  const o = document.getElementById("loadingOverlay");
  if (o) {
    o.innerHTML = `<div class="error-box"><div class="title">Σφάλμα φόρτωσης</div><div>${msg}</div>${detail ? `<div style="margin-top:10px;color:var(--text-2);font-size:10px">${detail}</div>` : ""}</div>`;
  }
}

async function startApp() {
  let RAW;
  try {
    setProgress(10, "Φόρτωση δεδομένων…");
    const resp = await fetch("data.json", { cache: "no-cache" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    setProgress(40, "Ανάγνωση…");
    const text = await resp.text();
    setProgress(70, "Επεξεργασία…");
    await new Promise(r => setTimeout(r, 30));
    RAW = JSON.parse(text);
    setProgress(90, "Σχεδίαση…");
    await new Promise(r => setTimeout(r, 30));
  } catch (err) {
    showError("Αδυναμία φόρτωσης data.json", err.message);
    return;
  }
  try {
    bootstrap(RAW);
    setProgress(100, "Έτοιμο");
    setTimeout(hideLoader, 200);
  } catch (err) {
    showError("Σφάλμα κατά τον υπολογισμό", err.message + "<br><br>" + (err.stack || "").replace(/\n/g, "<br>"));
    console.error(err);
  }
}

// =====================================================================
// MAIN APPLICATION
// =====================================================================
function bootstrap(RAW) {

const META = RAW.meta;
const STORES = META.stores;
const SALESTYPES = META.salestypes;
const CHANNELGROUPS = META.channelgroups;
const STORE_META = META.store_meta;
const BUDGET = RAW.budget;

// --- Pre-build aggregates by date ---
const dailyStoreST = new Map();
const dailyStoreCH = new Map();
const dailyStore = new Map();
const dailyTotal = new Map();

function ensureDate(d) {
  if (!dailyStore.has(d)) {
    dailyStore.set(d, new Array(STORES.length).fill(null).map(() => ({sales:0, tcs:0})));
    dailyTotal.set(d, {sales:0, tcs:0});
    const stArr = new Array(STORES.length);
    for (let i = 0; i < STORES.length; i++) stArr[i] = new Array(SALESTYPES.length).fill(null).map(() => ({sales:0, tcs:0}));
    dailyStoreST.set(d, stArr);
    const chArr = new Array(STORES.length);
    for (let i = 0; i < STORES.length; i++) chArr[i] = new Array(CHANNELGROUPS.length).fill(null).map(() => ({sales:0, tcs:0}));
    dailyStoreCH.set(d, chArr);
  }
}

RAW.records_st.forEach(r => {
  const [d, si, sti, s, t] = r;
  ensureDate(d);
  dailyStore.get(d)[si].sales += s;
  dailyStore.get(d)[si].tcs += t;
  dailyTotal.get(d).sales += s;
  dailyTotal.get(d).tcs += t;
  dailyStoreST.get(d)[si][sti].sales += s;
  dailyStoreST.get(d)[si][sti].tcs += t;
});
RAW.records_ch.forEach(r => {
  const [d, si, ci, s, t] = r;
  ensureDate(d);
  dailyStoreCH.get(d)[si][ci].sales += s;
  dailyStoreCH.get(d)[si][ci].tcs += t;
});

const monthStoreTotal = new Map();
for (const [d, perStore] of dailyStore.entries()) {
  const ym = d.slice(0,7);
  if (!monthStoreTotal.has(ym)) {
    monthStoreTotal.set(ym, new Array(STORES.length).fill(null).map(() => ({sales:0, tcs:0})));
  }
  const m = monthStoreTotal.get(ym);
  for (let si = 0; si < STORES.length; si++) {
    m[si].sales += perStore[si].sales;
    m[si].tcs += perStore[si].tcs;
  }
}

const LATEST = META.latest_date;
const FIRST = META.first_date;

// =====================================================================
// DATE HELPERS — UTC SAFE
// =====================================================================
function dateStrAdd(dStr, days) {
  const [y, m, d] = dStr.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m-1, d));
  dt.setUTCDate(dt.getUTCDate() + days);
  return dt.getUTCFullYear() + "-" + String(dt.getUTCMonth()+1).padStart(2,"0") + "-" + String(dt.getUTCDate()).padStart(2,"0");
}
function dowName(i) { return ["Δευ","Τρι","Τετ","Πεμ","Παρ","Σαβ","Κυρ"][i]; }
function shortMonth(m) { return ["","Ιαν","Φεβ","Μαρ","Απρ","Μαι","Ιουν","Ιουλ","Αυγ","Σεπ","Οκτ","Νοε","Δεκ"][m]; }
function dateGreek(dStr) {
  const [y, m, d] = dStr.split("-").map(Number);
  return d + " " + shortMonth(m) + " " + y;
}
function getDOW(dStr) {
  const [y, m, d] = dStr.split("-").map(Number);
  return (new Date(Date.UTC(y, m-1, d)).getUTCDay() + 6) % 7;
}
function lyDate(dStr, mode) {
  if (mode === "cal") {
    const [y,m,d] = dStr.split("-").map(Number);
    return (y-1) + "-" + String(m).padStart(2,"0") + "-" + String(d).padStart(2,"0");
  }
  return dateStrAdd(dStr, -364);
}
function dateRange(from, to) {
  const out = [];
  if (!from || !to || from > to) return out;
  let cur = from, guard = 0;
  while (cur <= to && guard < 1000) {
    out.push(cur);
    cur = dateStrAdd(cur, 1);
    guard++;
  }
  return out;
}

// =====================================================================
// FORMATTERS
// =====================================================================
function fmtEur(v) {
  if (v == null || isNaN(v)) return "—";
  const sign = v < 0 ? "-" : "";
  v = Math.abs(v);
  return sign + Math.round(v).toLocaleString("en-US").replace(/,/g, ".") + " €";
}
function fmtEurK(v) {
  if (v == null || isNaN(v)) return "—";
  if (Math.abs(v) >= 1000000) return (v/1000000).toFixed(2).replace(".", ",") + " M€";
  if (Math.abs(v) >= 1000) return Math.round(v/1000).toLocaleString("en-US").replace(/,/g, ".") + "K €";
  return Math.round(v).toLocaleString("en-US").replace(/,/g, ".") + " €";
}
function fmtNum(v) {
  if (v == null || isNaN(v)) return "—";
  return Math.round(v).toLocaleString("en-US").replace(/,/g, ".");
}
function fmtPct(v, decimals=1) {
  if (v == null || isNaN(v) || !isFinite(v)) return "—";
  const sign = v > 0 ? "+" : "";
  return sign + (v*100).toFixed(decimals).replace(".", ",") + "%";
}
function fmtAvg(v) {
  if (v == null || isNaN(v)) return "—";
  return v.toFixed(2).replace(".", ",") + " €";
}
function pctClass(v, threshold=0.005) {
  if (v == null || isNaN(v) || !isFinite(v)) return "flat";
  if (v > threshold) return "pos";
  if (v < -threshold) return "neg";
  return "flat";
}
function pctTag(v) {
  return `<span class="pct ${pctClass(v)}">${fmtPct(v)}</span>`;
}

// =====================================================================
// PERIOD RESOLUTION
// =====================================================================
function resolvePeriod(view, asOf) {
  const [y, m, d] = asOf.split("-").map(Number);
  let from, to;
  if (view === "MTD") { from = asOf.slice(0,7) + "-01"; to = asOf; }
  else if (view === "QTD") {
    const qStart = m - ((m-1)%3);
    from = y + "-" + String(qStart).padStart(2,"0") + "-01"; to = asOf;
  }
  else if (view === "YTD") { from = y + "-01-01"; to = asOf; }
  else if (view === "LAST7") { from = dateStrAdd(asOf, -6); to = asOf; }
  else if (view === "LAST30") { from = dateStrAdd(asOf, -29); to = asOf; }
  else if (view === "DAY") { from = asOf; to = asOf; }
  return [from, to];
}

// =====================================================================
// AGGREGATION
// =====================================================================
function aggregate(fromDate, toDate) {
  const dates = dateRange(fromDate, toDate);
  const byStore = new Array(STORES.length).fill(null).map(() => ({sales:0, tcs:0}));
  const byST = new Array(STORES.length).fill(null).map(() => new Array(SALESTYPES.length).fill(null).map(() => ({sales:0, tcs:0})));
  const byCH = new Array(STORES.length).fill(null).map(() => new Array(CHANNELGROUPS.length).fill(null).map(() => ({sales:0, tcs:0})));
  let totalSales = 0, totalTCs = 0;
  for (const d of dates) {
    const ds = dailyStore.get(d);
    if (!ds) continue;
    const dt = dailyTotal.get(d);
    totalSales += dt.sales; totalTCs += dt.tcs;
    for (let si = 0; si < STORES.length; si++) {
      byStore[si].sales += ds[si].sales;
      byStore[si].tcs += ds[si].tcs;
    }
    const st = dailyStoreST.get(d);
    for (let si = 0; si < STORES.length; si++) {
      for (let sti = 0; sti < SALESTYPES.length; sti++) {
        byST[si][sti].sales += st[si][sti].sales;
        byST[si][sti].tcs += st[si][sti].tcs;
      }
    }
    const ch = dailyStoreCH.get(d);
    for (let si = 0; si < STORES.length; si++) {
      for (let ci = 0; ci < CHANNELGROUPS.length; ci++) {
        byCH[si][ci].sales += ch[si][ci].sales;
        byCH[si][ci].tcs += ch[si][ci].tcs;
      }
    }
  }
  return { byStore, byST, byCH, total: {sales: totalSales, tcs: totalTCs}, dates };
}

const _budgetDayCache = new Map();
function getDayBudget(dateStr, storeIdx, ly_mode) {
  const key = dateStr + "|" + storeIdx + "|" + ly_mode;
  if (_budgetDayCache.has(key)) return _budgetDayCache.get(key);
  const month = parseInt(dateStr.split("-")[1]);
  const storeName = STORES[storeIdx];
  const monthBudget = BUDGET[storeName] && BUDGET[storeName][String(month)];
  if (!monthBudget) {
    const r = {sales:0, tcs:0};
    _budgetDayCache.set(key, r); return r;
  }
  const lyD = lyDate(dateStr, ly_mode);
  const lyYM = lyD.slice(0,7);
  const [lyY, lyM] = lyD.split("-").map(Number);
  const lyDaysInMonth = new Date(Date.UTC(lyY, lyM, 0)).getUTCDate();
  const lyMonthAgg = monthStoreTotal.get(lyYM);
  const lyMonthSales = lyMonthAgg ? lyMonthAgg[storeIdx].sales : 0;
  const lyMonthTCs = lyMonthAgg ? lyMonthAgg[storeIdx].tcs : 0;
  const lyDayAgg = dailyStore.get(lyD);
  const lyDaySales = lyDayAgg ? lyDayAgg[storeIdx].sales : 0;
  const lyDayTCs = lyDayAgg ? lyDayAgg[storeIdx].tcs : 0;
  const dayBS = lyMonthSales > 0 ? monthBudget.Sales * (lyDaySales / lyMonthSales) : monthBudget.Sales / lyDaysInMonth;
  const dayBT = lyMonthTCs > 0 ? monthBudget.TCs * (lyDayTCs / lyMonthTCs) : monthBudget.TCs / lyDaysInMonth;
  const r = {sales: dayBS, tcs: dayBT};
  _budgetDayCache.set(key, r);
  return r;
}

function periodBudget(fromDate, toDate, ly_mode) {
  const dates = dateRange(fromDate, toDate);
  const byStore = new Array(STORES.length).fill(null).map(() => ({sales:0, tcs:0}));
  let totalSales = 0, totalTCs = 0;
  for (let si = 0; si < STORES.length; si++) {
    let s = 0, t = 0;
    for (const d of dates) {
      const b = getDayBudget(d, si, ly_mode);
      s += b.sales; t += b.tcs;
    }
    byStore[si] = {sales: s, tcs: t};
    totalSales += s; totalTCs += t;
  }
  return { byStore, total: {sales: totalSales, tcs: totalTCs} };
}

function fullMonthBudget(monthStr) {
  const month = parseInt(monthStr.split("-")[1]);
  const byStore = new Array(STORES.length).fill(null).map(() => ({sales:0, tcs:0}));
  let totalSales = 0, totalTCs = 0;
  for (let si = 0; si < STORES.length; si++) {
    const sn = STORES[si];
    const mb = BUDGET[sn] && BUDGET[sn][String(month)];
    if (mb) {
      byStore[si] = {sales: mb.Sales, tcs: mb.TCs};
      totalSales += mb.Sales; totalTCs += mb.TCs;
    }
  }
  return { byStore, total: {sales: totalSales, tcs: totalTCs} };
}

const STATE = {
  view: "MTD",
  asOf: LATEST,
  ly_mode: "364",
  activeTab: "overview",
  selectedStore: 0,
};

function compute() {
  const [from, to] = resolvePeriod(STATE.view, STATE.asOf);
  const cy = aggregate(from, to);
  const lyFrom = lyDate(from, STATE.ly_mode);
  const lyTo = lyDate(to, STATE.ly_mode);
  const ly = aggregate(lyFrom, lyTo);
  const budget = periodBudget(from, to, STATE.ly_mode);
  const periodDays = dateRange(from, to).length;
  const month = to.slice(0,7);
  const [yE, mE] = to.split("-").map(Number);
  const monthDays = new Date(Date.UTC(yE, mE, 0)).getUTCDate();
  const fullMonth = fullMonthBudget(month);
  return { from, to, periodDays, monthDays, month, cy, ly, budget, fullMonth };
}

// =====================================================================
// HEADER + KPI RENDERERS
// =====================================================================
function renderHeader(R) {
  document.getElementById("reportDate").textContent = dateGreek(R.to);
  document.getElementById("reportCoverage").textContent = R.periodDays + "/" + R.monthDays + " ημ.";
  let active = 0;
  for (let si = 0; si < STORES.length; si++) if (R.cy.byStore[si].sales > 0) active++;
  document.getElementById("reportStores").textContent = active + "/" + STORES.length;
}

function renderKPI(R) {
  const root = document.getElementById("kpiRow");
  const cyS = R.cy.total.sales, cyT = R.cy.total.tcs;
  const lyS = R.ly.total.sales, lyT = R.ly.total.tcs;
  const bS = R.budget.total.sales, bT = R.budget.total.tcs;
  const cyAvg = cyT > 0 ? cyS/cyT : 0;
  const lyAvg = lyT > 0 ? lyS/lyT : 0;
  const bAvg = bT > 0 ? bS/bT : 0;
  const dSL = lyS > 0 ? (cyS - lyS) / lyS : null;
  const dTL = lyT > 0 ? (cyT - lyT) / lyT : null;
  const dAL = lyAvg > 0 ? (cyAvg - lyAvg) / lyAvg : null;
  const dSB = bS > 0 ? (cyS - bS) / bS : null;
  const dTB = bT > 0 ? (cyT - bT) / bT : null;
  const dAB = bAvg > 0 ? (cyAvg - bAvg) / bAvg : null;
  const monthlyBudget = R.fullMonth.total.sales;
  const forecast = bS > 0 ? cyS * (monthlyBudget / bS) : null;
  const forecastVsBudget = forecast && monthlyBudget > 0 ? (forecast - monthlyBudget) / monthlyBudget : null;

  const cards = [
    { cls: "primary", label: "Net Sales", value: fmtEurK(cyS),
      sub: [["vs Budget", dSB], ["vs LY", dSL]] },
    { cls: "secondary", label: "Transactions", value: fmtNum(cyT),
      sub: [["vs Budget", dTB], ["vs LY", dTL]] },
    { cls: "tertiary", label: "Avg Ticket", value: fmtAvg(cyAvg),
      sub: [["vs Budget", dAB], ["vs LY", dAL]] },
    { cls: "primary", label: "Period Budget", value: fmtEurK(bS),
      sub: [["Days covered", null, R.periodDays + "/" + R.monthDays]] },
    { cls: "secondary", label: "Monthly Budget", value: fmtEurK(monthlyBudget),
      sub: [["Month", null, shortMonth(parseInt(R.month.split("-")[1]))]] },
    { cls: "tertiary", label: "Month Forecast", value: fmtEurK(forecast),
      sub: [["vs Monthly", forecastVsBudget]] }
  ];

  root.innerHTML = cards.map(c => `
    <div class="kpi-card ${c.cls}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}</div>
      <div class="kpi-sub">
        ${c.sub.map(s => {
          if (s[1] === null) return `<div class="row"><span class="versus">${s[0]}</span><span class="delta flat">${s[2]||"—"}</span></div>`;
          return `<div class="row"><span class="versus">${s[0]}</span><span class="delta ${pctClass(s[1])}">${fmtPct(s[1])}</span></div>`;
        }).join("")}
      </div>
    </div>
  `).join("");
}

// =====================================================================
// CARD HELPERS — used by all data renderers
// =====================================================================
function storeCard(opts) {
  // opts: { name, rank?, cy, ly, b, accent: "primary"|"good"|"grand" }
  const { name, rank, cy, ly, b, accent } = opts;
  const cyAvg = cy.tcs > 0 ? cy.sales/cy.tcs : 0;
  const lyAvg = ly && ly.tcs > 0 ? ly.sales/ly.tcs : 0;
  const dSL = ly && ly.sales > 0 ? (cy.sales - ly.sales)/ly.sales : null;
  const dTL = ly && ly.tcs > 0 ? (cy.tcs - ly.tcs)/ly.tcs : null;
  const dSB = b && b.sales > 0 ? (cy.sales - b.sales)/b.sales : null;
  const dTB = b && b.tcs > 0 ? (cy.tcs - b.tcs)/b.tcs : null;

  const cls = accent === "grand" ? "grand" : "accent";
  return `
    <div class="card ${cls}">
      <div class="card-title">
        <span class="name">${name}</span>
        ${rank ? `<span class="rank">${rank}</span>` : ""}
      </div>
      <div class="card-rows">
        <div class="card-row"><span class="lbl">Net Sales</span><span class="val">${fmtEur(cy.sales)}</span></div>
        <div class="card-row"><span class="lbl">Transactions</span><span class="val">${fmtNum(cy.tcs)}</span></div>
        <div class="card-row"><span class="lbl">Avg Ticket</span><span class="val">${fmtAvg(cyAvg)}</span></div>
        ${b ? `<div class="card-row"><span class="lbl">vs Budget</span><span class="val">${pctTag(dSB)}</span></div>` : ""}
        ${ly ? `<div class="card-row"><span class="lbl">vs LY (Sales)</span><span class="val">${pctTag(dSL)}</span></div>` : ""}
        ${ly ? `<div class="card-row"><span class="lbl">vs LY (TCs)</span><span class="val">${pctTag(dTL)}</span></div>` : ""}
      </div>
    </div>
  `;
}

function breakdownCard(opts) {
  // opts: { label, cy, ly, mix }
  const { label, cy, ly, mix } = opts;
  const cyAvg = cy.tcs > 0 ? cy.sales/cy.tcs : 0;
  const lyAvg = ly && ly.tcs > 0 ? ly.sales/ly.tcs : 0;
  const dS = ly && ly.sales > 0 ? (cy.sales - ly.sales)/ly.sales : null;
  const dT = ly && ly.tcs > 0 ? (cy.tcs - ly.tcs)/ly.tcs : null;
  return `
    <div class="card subcard">
      <div class="card-title">
        <span class="name">${label}</span>
        ${mix != null ? `<span class="rank">${(mix*100).toFixed(1).replace(".",",")}% mix</span>` : ""}
      </div>
      <div class="card-rows">
        <div class="card-row"><span class="lbl">CY Sales</span><span class="val">${fmtEur(cy.sales)}</span></div>
        <div class="card-row"><span class="lbl">CY TCs</span><span class="val">${fmtNum(cy.tcs)}</span></div>
        <div class="card-row"><span class="lbl">CY Avg</span><span class="val">${fmtAvg(cyAvg)}</span></div>
        ${ly ? `<div class="card-row"><span class="lbl">vs LY Sales</span><span class="val">${pctTag(dS)}</span></div>` : ""}
        ${ly ? `<div class="card-row"><span class="lbl">vs LY TCs</span><span class="val">${pctTag(dT)}</span></div>` : ""}
      </div>
    </div>
  `;
}

function renderOverview(R) {

      typeTotals[sti].cyT += R.cy.byST[si][sti].tcs;
      typeTotals[sti].lyS += R.ly.byST[si][sti].sales;
      typeTotals[sti].lyT += R.ly.byST[si][sti].tcs;
    }
  }

  html += `<div class="panel-section">
    <div class="section-title"><span>By Sales Type</span><span class="meta">${R.from} → ${R.to} · ${R.periodDays} ημ.</span></div>
    <div class="cards">`;
  for (let sti = 0; sti < SALESTYPES.length; sti++) {

      ly: { sales: t.lyS, tcs: t.lyT },

  html += `<div class="card grand">

      <div class="card-row"><span class="lbl">CY Sales</span><span class="val">${fmtEur(R.cy.total.sales)}</span></div>
      <div class="card-row"><span class="lbl">LY Sales</span><span class="val">${fmtEur(R.ly.total.sales)}</span></div>
      <div class="card-row"><span class="lbl">CY TCs</span><span class="val">${fmtNum(R.cy.total.tcs)}</span></div>
      <div class="card-row"><span class="lbl">LY TCs</span><span class="val">${fmtNum(R.ly.total.tcs)}</span></div>
      <div class="card-row"><span class="lbl">Sales vs LY</span><span class="val">${pctTag(R.ly.total.sales > 0 ? (R.cy.total.sales - R.ly.total.sales)/R.ly.total.sales : null)}</span></div>
    </div>
  </div>`;
  html += `</div></div>`;

  // Channel mix
  const chTotals = new Array(CHANNELGROUPS.length).fill(null).map(() => ({cyS:0, cyT:0, lyS:0, lyT:0}));
  for (let si = 0; si < STORES.length; si++) {
    for (let ci = 0; ci < CHANNELGROUPS.length; ci++) {
      chTotals[ci].cyS += R.cy.byCH[si][ci].sales;
      chTotals[ci].cyT += R.cy.byCH[si][ci].tcs;
      chTotals[ci].lyS += R.ly.byCH[si][ci].sales;
      chTotals[ci].lyT += R.ly.byCH[si][ci].tcs;
    }
  }
  html += `<div class="panel-section">
    <div class="section-title"><span>Channel Mix</span></div>
    <div class="cards">`;
  for (let ci = 0; ci < CHANNELGROUPS.length; ci++) {
    const t = chTotals[ci];
    if (t.cyS === 0 && t.lyS === 0) continue;
    const mix = R.cy.total.sales > 0 ? t.cyS / R.cy.total.sales : 0;
    html += breakdownCard({
      label: CHANNELGROUPS[ci],
      cy: { sales: t.cyS, tcs: t.cyT },
      ly: { sales: t.lyS, tcs: t.lyT },
      mix
    });
  }
  html += `</div></div>`;

  // Top / Bottom movers
  const moverData = [];
  for (let si = 0; si < STORES.length; si++) {

  html += `<div class="panel-section">
    <div class="section-title"><span>Bottom 5 · vs LY</span></div>
    <div class="cards">`;

  root.innerHTML = html;

function renderBreakdownByStore(R, mode) {
  const root = document.getElementById("tab-" + mode);
  const arr = [];
  for (let si = 0; si < STORES.length; si++) {
    const cy = R.cy.byStore[si];
    if (cy.sales === 0 && R.ly.byStore[si].sales === 0) continue;
    arr.push({si, cy: cy.sales});
  }
  arr.sort((a, b) => b.cy - a.cy);

  const labels = mode === "salestype" ? SALESTYPES : CHANNELGROUPS;
  const dataKey = mode === "salestype" ? "byST" : "byCH";
  const title = mode === "salestype" ? "Sales Type Breakdown · Per Store" : "Channel Breakdown · Per Store";

  let html = `<div class="panel-section">
    <div class="section-title"><span>${title}</span><span class="meta">${R.from} → ${R.to}</span></div>`;

  for (const {si} of arr) {
    const short = STORE_META[STORES[si]].short;
    const cyTotal = R.cy.byStore[si];
    html += `<div class="subsection-header">${short} · ${fmtEurK(cyTotal.sales)}</div>`;
    html += `<div class="cards">`;
    for (let li = 0; li < labels.length; li++) {
      const cy = R.cy[dataKey][si][li];
      const ly = R.ly[dataKey][si][li];
      if (cy.sales === 0 && ly.sales === 0) continue;
      const mix = cyTotal.sales > 0 ? cy.sales / cyTotal.sales : 0;
      html += breakdownCard({
        label: labels[li],
        cy: { sales: cy.sales, tcs: cy.tcs },
        ly: { sales: ly.sales, tcs: ly.tcs },
        mix
      });
    }
    html += `</div>`;
  }
  html += `</div>`;

  root.innerHTML = html;

function renderRankings(R) {
  const root = document.getElementById("tab-rankings");
  const arr = [];
  for (let si = 0; si < STORES.length; si++) {
    const cy = R.cy.byStore[si];
    const ly = R.ly.byStore[si];
    const b = R.budget.byStore[si];
    if (cy.sales === 0 && ly.sales === 0 && b.sales === 0) continue;
    arr.push({
      si, short: STORE_META[STORES[si]].short,
      cyS: cy.sales, cyT: cy.tcs, cyA: cy.tcs > 0 ? cy.sales/cy.tcs : 0,
      lyS: ly.sales, lyT: ly.tcs, lyA: ly.tcs > 0 ? ly.sales/ly.tcs : 0,
      bS: b.sales, bT: b.tcs, bA: b.tcs > 0 ? b.sales/b.tcs : 0,
    });
  }

  function rankSection(metricKey, label, fmt) {
    const sorted = [...arr].sort((a,b) => b[metricKey] - a[metricKey]);
    const max = sorted[0] && sorted[0][metricKey] || 1;
    let html = `<div class="panel-section">
      <div class="section-title"><span>${label}</span></div>
      <div class="cards">`;
    sorted.forEach((r, idx) => {
      const dL = metricKey === "cyS" ? (r.lyS > 0 ? (r.cyS - r.lyS)/r.lyS : null) :
                 metricKey === "cyT" ? (r.lyT > 0 ? (r.cyT - r.lyT)/r.lyT : null) :
                                       (r.lyA > 0 ? (r.cyA - r.lyA)/r.lyA : null);
      const dB = metricKey === "cyS" ? (r.bS > 0 ? (r.cyS - r.bS)/r.bS : null) :
                 metricKey === "cyT" ? (r.bT > 0 ? (r.cyT - r.bT)/r.bT : null) :
                                       (r.bA > 0 ? (r.cyA - r.bA)/r.bA : null);
      const w = (r[metricKey]/max*100).toFixed(0);
      html += `<div class="card accent">
        <div class="card-title">
          <span class="name">${idx+1}. ${r.short}</span>
          <span class="rank">${fmt(r[metricKey])}</span>
        </div>
        <div class="card-rows">
          <div class="card-row"><span class="lbl">vs LY</span><span class="val">${pctTag(dL)}</span></div>
          <div class="card-row"><span class="lbl">vs Budget</span><span class="val">${pctTag(dB)}</span></div>
          <div class="card-row" style="margin-top:4px"><div class="mini-bar"><div style="width:${w}%"></div></div></div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
    return html;
  }

  root.innerHTML =
    rankSection("cyS", "Net Sales Ranking", fmtEurK) +
    rankSection("cyT", "Transactions Ranking", fmtNum) +
    rankSection("cyA", "Avg Ticket Ranking", fmtAvg);
}

function renderDOW(R) {
  const root = document.getElementById("tab-dow");
  const cyByDOW = [0,1,2,3,4,5,6].map(()=>({sales:0, tcs:0, count:0}));
  const lyByDOW = [0,1,2,3,4,5,6].map(()=>({sales:0, tcs:0, count:0}));
  const dates = dateRange(R.from, R.to);
  for (const d of dates) {
    const dow = getDOW(d);
    const dt = dailyTotal.get(d);
    if (dt) { cyByDOW[dow].sales += dt.sales; cyByDOW[dow].tcs += dt.tcs; cyByDOW[dow].count++; }
    const ld = lyDate(d, STATE.ly_mode);
    const dow2 = getDOW(ld);
    const lt = dailyTotal.get(ld);
    if (lt) { lyByDOW[dow2].sales += lt.sales; lyByDOW[dow2].tcs += lt.tcs; lyByDOW[dow2].count++; }
  }

  let html = `<div class="panel-section">
    <div class="section-title"><span>Day-of-Week Profile</span><span class="meta">${R.from} → ${R.to}</span></div>
    <div class="cards">`;
  for (let i = 0; i < 7; i++) {
    const cy = cyByDOW[i], ly = lyByDOW[i];
    if (cy.count === 0 && ly.count === 0) continue;
    const cyAvgPerDay = cy.count > 0 ? cy.sales / cy.count : 0;
    const lyAvgPerDay = ly.count > 0 ? ly.sales / ly.count : 0;
    const dD = lyAvgPerDay > 0 ? (cyAvgPerDay - lyAvgPerDay)/lyAvgPerDay : null;
    const cyTicket = cy.tcs > 0 ? cy.sales/cy.tcs : 0;
    const lyTicket = ly.tcs > 0 ? ly.sales/ly.tcs : 0;
    html += `<div class="card accent-2">
      <div class="card-title">
        <span class="name">${dowName(i)}</span>
        <span class="rank">${cy.count} ημ.</span>
      </div>
      <div class="card-rows">
        <div class="card-row"><span class="lbl">CY Avg/Day</span><span class="val">${fmtEur(cyAvgPerDay)}</span></div>
        <div class="card-row"><span class="lbl">LY Avg/Day</span><span class="val">${fmtEur(lyAvgPerDay)}</span></div>
        <div class="card-row"><span class="lbl">Δ Avg/Day</span><span class="val">${pctTag(dD)}</span></div>
        <div class="card-row"><span class="lbl">CY Ticket</span><span class="val">${fmtAvg(cyTicket)}</span></div>
        <div class="card-row"><span class="lbl">LY Ticket</span><span class="val">${fmtAvg(lyTicket)}</span></div>
      </div>
    </div>`;
  }
  html += `</div></div>`;

  // Heatmap (last 30 days)
  const heatDates = dates.slice(-30);
  const stores = [];
  for (let si = 0; si < STORES.length; si++) {
    let any = false;
    for (const d of heatDates) {
      const ds = dailyStore.get(d);
      if (ds && ds[si].sales > 0) { any = true; break; }
    }
    if (any) stores.push(si);
  }
  const storeSales = {};
  for (const si of stores) {
    let s = 0;
    for (const d of heatDates) {
      const ds = dailyStore.get(d);
      if (ds) s += ds[si].sales;
    }
    storeSales[si] = s;
  }
  stores.sort((a, b) => storeSales[b] - storeSales[a]);

  let heatHTML = `<div class="heatmap-wrap"><div class="heatmap" style="grid-template-columns: 90px repeat(${heatDates.length}, minmax(34px, 1fr))">`;
  heatHTML += `<div class="heat-header" style="text-align:left">DAY</div>`;
  for (const d of heatDates) {
    const [yh, mh, dh] = d.split("-").map(Number);
    heatHTML += `<div class="heat-header">${dh}<br><span style="opacity:0.5">${dowName(getDOW(d)).slice(0,2)}</span></div>`;
  }
  for (const si of stores) {
    heatHTML += `<div class="heat-label">${STORE_META[STORES[si]].short}</div>`;
    for (const d of heatDates) {
      const ld = lyDate(d, STATE.ly_mode);
      const ds = dailyStore.get(d);
      const ls = dailyStore.get(ld);
      const cyS = ds ? ds[si].sales : 0;
      const lyS = ls ? ls[si].sales : 0;
      const dlt = lyS > 0 ? (cyS - lyS)/lyS : null;
      let bg = "var(--bg-2)", col = "var(--text-2)";
      if (dlt !== null) {
        const v = Math.max(-0.5, Math.min(0.5, dlt));
        if (v > 0) { bg = `rgba(34,197,94,${Math.min(0.6, v*1.2).toFixed(2)})`; col = "var(--text-0)"; }
        else { bg = `rgba(239,68,68,${Math.min(0.6, -v*1.2).toFixed(2)})`; col = "var(--text-0)"; }
      } else if (cyS > 0) bg = "rgba(100,116,139,0.1)";
      const txt = (dlt === null && cyS === 0) ? "·" : (dlt === null ? "?" : (dlt*100).toFixed(0));
      heatHTML += `<div class="heat-cell" style="background:${bg};color:${col}" title="${d} vs ${ld}: CY ${fmtEur(cyS)} / LY ${fmtEur(lyS)}">${txt}</div>`;
    }
  }
  heatHTML += `</div></div>`;

  html += `<div class="panel-section">
    <div class="section-title"><span>Heatmap · vs LY % per Day per Store</span><span class="meta">τελευταίες ${heatDates.length} ημέρες · σύρε δεξιά</span></div>
    ${heatHTML}
  </div>`;

  root.innerHTML = html;
}

function renderTrend(R) {
  const root = document.getElementById("tab-trend");
  const dates = dateRange(R.from, R.to);
  const series = dates.map(d => {
    const ld = lyDate(d, STATE.ly_mode);
    const dt = dailyTotal.get(d) || {sales:0, tcs:0};
    const lt = dailyTotal.get(ld) || {sales:0, tcs:0};
    let bS = 0;
    for (let si = 0; si < STORES.length; si++) bS += getDayBudget(d, si, STATE.ly_mode).sales;
    return {date:d, cyS:dt.sales, lyS:lt.sales, bS};
  });
  let cumCY = 0, cumLY = 0, cumB = 0;
  const cumSeries = series.map(p => { cumCY += p.cyS; cumLY += p.lyS; cumB += p.bS; return {date:p.date, cumCY, cumLY, cumB}; });

  function chartSVG(data, accessors, fmt) {
    const W = 700, H = 280, PAD = {l:55, r:15, t:20, b:30};
    const innerW = W - PAD.l - PAD.r, innerH = H - PAD.t - PAD.b;
    const allVals = [];
    accessors.forEach(a => data.forEach(p => allVals.push(a.fn(p))));
    const valids = allVals.filter(v => v !== null && !isNaN(v));
    const minV = Math.min(...valids);
    const maxV = Math.max(...valids);
    const range = maxV - minV || 1;
    const yMin = minV - range*0.1, yMax = maxV + range*0.1;
    const xScale = i => PAD.l + (i / (data.length - 1 || 1)) * innerW;
    const yScale = v => PAD.t + innerH - ((v - yMin) / (yMax - yMin)) * innerH;
    let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
    for (let i = 0; i <= 4; i++) {
      const y = PAD.t + innerH * i / 4;
      const v = yMax - (yMax - yMin) * i / 4;
      svg += `<line x1="${PAD.l}" y1="${y}" x2="${W-PAD.r}" y2="${y}" stroke="var(--border-soft)" stroke-width="1"/>`;
      svg += `<text x="${PAD.l-6}" y="${y+4}" text-anchor="end" fill="var(--text-2)" font-size="9" font-family="var(--mono)">${fmt(v)}</text>`;
    }
    const step = Math.max(1, Math.ceil(data.length/10));
    for (let i = 0; i < data.length; i += step) {
      const x = xScale(i);
      const [yc, mc, dc] = data[i].date.split("-").map(Number);
      svg += `<text x="${x}" y="${H-8}" text-anchor="middle" fill="var(--text-2)" font-size="9" font-family="var(--mono)">${dc}/${mc}</text>`;
    }
    accessors.forEach(a => {
      const pts = data.map((p, i) => `${xScale(i)},${yScale(a.fn(p))}`).join(" ");
      svg += `<polyline fill="none" stroke="${a.color}" stroke-width="${a.width||2}" stroke-dasharray="${a.dash||""}" points="${pts}" />`;
    });
    let lx = PAD.l + 10;
    accessors.forEach(a => {
      svg += `<rect x="${lx}" y="${PAD.t+6}" width="14" height="3" fill="${a.color}" stroke-dasharray="${a.dash||""}"/>`;
      svg += `<text x="${lx+18}" y="${PAD.t+10}" fill="var(--text-1)" font-size="11">${a.label}</text>`;
      lx += 22 + a.label.length * 7 + 14;
    });
    svg += `</svg>`;
    return svg;
  }

  const acc1 = [
    {label:"Actual", fn:p=>p.cyS, color:"#ef4444", width:2.2},
    {label:"LY", fn:p=>p.lyS, color:"#f59e0b", width:1.8, dash:"4 3"},
    {label:"Budget", fn:p=>p.bS, color:"#22c55e", width:1.8, dash:"2 3"},
  ];
  const acc2 = [
    {label:"CY cum", fn:p=>p.cumCY, color:"#ef4444", width:2.2},
    {label:"LY cum", fn:p=>p.cumLY, color:"#f59e0b", width:1.8, dash:"4 3"},
    {label:"Bud cum", fn:p=>p.cumB, color:"#22c55e", width:1.8, dash:"2 3"},
  ];
  root.innerHTML = `
    <div class="panel-section">
      <div class="section-title"><span>Daily Trend</span><span class="meta">${R.from} → ${R.to} · σύρε δεξιά</span></div>
      <div class="chart-wrap">
        <div class="chart-title">Daily Net Sales (€)</div>
        ${chartSVG(series, acc1, fmtEurK)}
      </div>
    </div>
    <div class="panel-section">
      <div class="section-title"><span>Cumulative Trend</span></div>
      <div class="chart-wrap">
        <div class="chart-title">Cumulative Net Sales (€)</div>
        ${chartSVG(cumSeries, acc2, fmtEurK)}
      </div>
    </div>`;
}

function renderStoreDeep(R) {
  const root = document.getElementById("tab-storedeep");
  const opts = STORES.map((s,i) => `<option value="${i}" ${i===STATE.selectedStore?"selected":""}>${STORE_META[s].short}</option>`).join("");
  const si = STATE.selectedStore;
  const storeName = STORES[si];
  const short = STORE_META[storeName].short;
  const cy = R.cy.byStore[si];
  const ly = R.ly.byStore[si];
  const b = R.budget.byStore[si];
  const fb = R.fullMonth.byStore[si];
  const cyAvg = cy.tcs > 0 ? cy.sales/cy.tcs : 0;
  const lyAvg = ly.tcs > 0 ? ly.sales/ly.tcs : 0;
  const bAvg = b.tcs > 0 ? b.sales/b.tcs : 0;
  const forecast = b.sales > 0 ? cy.sales * (fb.sales / b.sales) : null;
  const forecastVsBudget = forecast && fb.sales > 0 ? (forecast - fb.sales)/fb.sales : null;

  let html = `<div class="store-select-wrap">
    <span class="control-label">Επιλογή καταστήματος</span>
    <select id="storeSelect">${opts}</select>
  </div>`;

  html += `<div class="panel-section">
    <div class="cards">
      ${storeCard({ name: short + " · MTD", cy, ly, b, accent: "primary" })}
      <div class="card good">
        <div class="card-title">
          <span class="name">Month Forecast</span>
          <span class="rank">${forecast ? pctTag(forecastVsBudget) : ""}</span>
        </div>
        <div class="card-rows">
          <div class="card-row"><span class="lbl">Forecast</span><span class="val">${fmtEurK(forecast)}</span></div>
          <div class="card-row"><span class="lbl">Monthly Budget</span><span class="val">${fmtEurK(fb.sales)}</span></div>
        </div>
      </div>
    </div>
  </div>`;

  // Sales Type breakdown for this store
  html += `<div class="panel-section">
    <div class="section-title"><span>Sales Type Breakdown</span></div>
    <div class="cards">`;
  for (let sti = 0; sti < SALESTYPES.length; sti++) {
    const cyV = R.cy.byST[si][sti];
    const lyV = R.ly.byST[si][sti];
    if (cyV.sales === 0 && lyV.sales === 0) continue;
    const mix = cy.sales > 0 ? cyV.sales/cy.sales : 0;
    html += breakdownCard({
      label: SALESTYPES[sti],
      cy: { sales: cyV.sales, tcs: cyV.tcs },
      ly: { sales: lyV.sales, tcs: lyV.tcs },
      mix
    });
  }
  html += `</div></div>`;

  // Channel breakdown
  html += `<div class="panel-section">
    <div class="section-title"><span>Channel Breakdown</span></div>
    <div class="cards">`;
  for (let ci = 0; ci < CHANNELGROUPS.length; ci++) {
    const cyV = R.cy.byCH[si][ci];
    const lyV = R.ly.byCH[si][ci];
    if (cyV.sales === 0 && lyV.sales === 0) continue;
    const mix = cy.sales > 0 ? cyV.sales/cy.sales : 0;
    html += breakdownCard({
      label: CHANNELGROUPS[ci],
      cy: { sales: cyV.sales, tcs: cyV.tcs },
      ly: { sales: lyV.sales, tcs: lyV.tcs },
      mix
    });
  }
  html += `</div></div>`;

  root.innerHTML = html;
  document.getElementById("storeSelect").addEventListener("change", e => {
    STATE.selectedStore = parseInt(e.target.value);
    renderActive();
  });
}

// =====================================================================
// MAIN DISPATCH
// =====================================================================
let _cachedR = null;
function renderActive() {
  if (!_cachedR) _cachedR = compute();
  const R = _cachedR;
  renderHeader(R);
  renderKPI(R);
  const map = {
    overview: renderOverview, bystore: renderByStore, salestype: renderSalesType,
    channels: renderChannels, rankings: renderRankings, dow: renderDOW,
    trend: renderTrend, storedeep: renderStoreDeep,
  };
  map[STATE.activeTab](R);
}
function refresh() { _cachedR = null; renderActive(); }

// =====================================================================
// EVENT LISTENERS
// =====================================================================
document.querySelectorAll("#viewBtns button").forEach(b => b.addEventListener("click", e => {
  document.querySelectorAll("#viewBtns button").forEach(x => x.classList.remove("active"));
  e.target.classList.add("active");
  STATE.view = e.target.dataset.view;
  refresh();
}));
document.querySelectorAll("#lyBtns button").forEach(b => b.addEventListener("click", e => {
  document.querySelectorAll("#lyBtns button").forEach(x => x.classList.remove("active"));
  e.target.classList.add("active");
  STATE.ly_mode = e.target.dataset.ly;
  refresh();
}));
document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", e => {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(x => x.classList.remove("active"));
  e.target.classList.add("active");
  const tab = e.target.dataset.tab;
  document.getElementById("tab-" + tab).classList.add("active");
  STATE.activeTab = tab;
  renderActive();
}));
document.getElementById("asOfDate").addEventListener("change", e => {
  STATE.asOf = e.target.value;
  refresh();
});

document.getElementById("asOfDate").value = LATEST;
document.getElementById("asOfDate").min = FIRST;
document.getElementById("asOfDate").max = LATEST;

renderActive();
}
</script>
